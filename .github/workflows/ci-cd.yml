name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Frontend Tests and Build
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        continue-on-error: true
        run: pnpm audit --prod --audit-level moderate || echo "⚠️ Audit found issues (non-blocking)"

      - name: Build frontend
        run: pnpm --filter client build

      - name: Run frontend tests
        run: pnpm --filter client test

      - name: Upload build artifacts
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: client/dist/
          retention-days: 30

  # Backend Tests and Build
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit backend dependencies
        continue-on-error: true
        run: pnpm audit --prod --audit-level high || echo "⚠️ Audit found issues (non-blocking)"

      - name: Build backend
        run: pnpm --filter server build

      - name: Run backend tests
        run: pnpm --filter server test
        env:
          NODE_ENV: test
          LOCAL_DB_CONNECTION_STRING: mongodb://localhost:27017/placemento_test
          JWT_SECRET: test_secret_key
          EMAIL_USER: test@example.com
          EMAIL_PASS: test_password

  # Security and Quality Checks
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (production)
        continue-on-error: true
        run: pnpm audit --prod --audit-level moderate

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'
        with:
          fail-on-severity: high

  # Code Quality
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: pnpm run format -- --check

      - name: Validate package.json files
        run: |
          echo "📋 Validating package.json files..."
          node -e "console.log('Root package name:', require('./package.json').name)"
          node -e "console.log('Client package name:', require('./client/package.json').name)"
          node -e "console.log('Server package name:', require('./server/package.json').name)"
          echo "✅ All package.json files are valid"

  # Build and Deploy (Production)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [frontend, backend, security, quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: client/dist/

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          # Add your deployment commands here

      - name: Notify deployment
        run: echo "✅ Deployment completed successfully!"
